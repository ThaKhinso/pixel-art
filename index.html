<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./tailwind.css"></script>
    <title>Pixel Art</title>
    <style type="text/tailwindcss">
       #grid {
            background-image: 
                linear-gradient(45deg, #f0f0f0 25%, transparent 25%), 
                linear-gradient(-45deg, #f0f0f0 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #f0f0f0 75%), 
                linear-gradient(-45deg, transparent 75%, #f0f0f0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: white;
        }

    </style>
</head>
<body>
    <h1 class="w-full text-center my-5 font-bold">Pixel Art</h1>
    <div class="flex flex- w-[70vw] h-[81vh] mx-auto my-10">
        <div class=" mr-8">
            <label for="boardSize" class="block mb-2">Board Size</label>     
            <input class="w-[300px]" type="range" name="size" id="boardSize" min="16" max="256" value="64"/>
            <label>Choose An Color:</label>
            <label for="color-picker" class="text-center text-white border-1 border-black block w-full h-8 rounded-xl cursor-pointer">
                <input 
                id="color-picker"  
                type="color"
                value="#FFFFFF"
                class="sr-only"/>

            </label><br>
            <button type="button" class="w-full border-1 rounded-xl bg-red-200" onclick="clearBoard()">Clear</button>
            <br>
            <button type="button" 
        class="w-full border-1 rounded-xl bg-blue-200 mt-2" 
        onclick="exportImage()">
    Download PNG
</button>
        </div>
        <div id="board-container" class=" w-full h-full">
            <div id="grid"></div>
        </div>
    </div>
</body>
<script src="./script.js"></script>
</html>
